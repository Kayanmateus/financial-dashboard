services:
  - type: web
    name: financial-dashboard
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: financial-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: financial-db
    databaseName: financial
    user: financial
